<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Color-Coded Builder</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 8px; width: 250px; }
        select, button { width: 100%; padding: 10px; margin-top: 10px; font-weight: bold; cursor: pointer; border-radius: 4px; border: none; }
        select { background: #fff; color: #000; }
        button { background: #3e8e41; color: white; }
        button:hover { background: #4caf50; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>Voxel Builder</h3>
        <p><b>Left Click:</b> Place Block</p>
        <p><b>Shift + Left Click:</b> Delete</p>
        <p><b>Right Click & Drag:</b> Rotate Camera</p>
        
        <label for="blockSelect">Choose Block:</label>
        <select id="blockSelect">
            <option value="minecraft:grass_block" data-color="#55aa55">Grass Block (Green)</option>
            <option value="minecraft:dirt" data-color="#8b4513">Dirt (Brown)</option>
            <option value="minecraft:stone" data-color="#888888">Stone (Gray)</option>
            <option value="minecraft:oak_planks" data-color="#cdaa7d">Oak Planks (Tan)</option>
            <option value="minecraft:glass" data-color="#add8e6">Glass (Light Blue)</option>
            <option value="minecraft:gold_block" data-color="#ffd700">Gold Block (Yellow)</option>
            <option value="minecraft:obsidian" data-color="#221f2e">Obsidian (Dark Purple)</option>
        </select>

        <button id="exportBtn">Export .mcstructure</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
