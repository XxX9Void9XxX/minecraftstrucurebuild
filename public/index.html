<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Web Builder</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 8px; }
        button { background: #3e8e41; color: white; border: none; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; width: 100%; margin-top: 10px; }
        button:hover { background: #4caf50; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>Voxel Builder</h3>
        <p><b>Left Click:</b> Place Block</p>
        <p><b>Shift + Left Click:</b> Delete</p>
        <p><b>Drag:</b> Rotate Camera</p>
        <button id="exportBtn">Export to Minecraft</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(10, 10, 15);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        const gridHelper = new THREE.GridHelper(20, 20);
        gridHelper.position.set(9.5, -0.5, 9.5); // Offset grid to align with 0-19 coords
        scene.add(gridHelper);

        scene.add(new THREE.AmbientLight(0x606060));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7.5);
        scene.add(dirLight);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const objects = [gridHelper];
        const blockData = []; // Store actual coordinates

        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const blockMat = new THREE.MeshLambertMaterial({ color: 0x808080 }); // Stone color

        let startX = 0, startY = 0;
        renderer.domElement.addEventListener('pointerdown', (e) => {
            startX = e.clientX; startY = e.clientY;
        });

        window.addEventListener('pointerup', (event) => {
            if (Math.abs(event.clientX - startX) > 5 || Math.abs(event.clientY - startY) > 5) return; // Prevent drag-clicks

            mouse.set((event.clientX / window.innerWidth) * 2 - 1, -(event.clientY / window.innerHeight) * 2 + 1);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects, false);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                if (event.shiftKey) {
                    if (intersect.object !== gridHelper) {
                        scene.remove(intersect.object);
                        objects.splice(objects.indexOf(intersect.object), 1);
                        // Remove from data array
                        const index = blockData.findIndex(b => b.mesh === intersect.object);
                        if (index > -1) blockData.splice(index, 1);
                    }
                } else {
                    const voxel = new THREE.Mesh(blockGeo, blockMat);
                    voxel.position.copy(intersect.point).add(intersect.face.normal).floor().addScalar(0.5);
                    scene.add(voxel);
                    objects.push(voxel);
                    
                    // Save the raw Minecraft coordinates
                    blockData.push({
                        mesh: voxel,
                        x: Math.floor(voxel.position.x),
                        y: Math.floor(voxel.position.y),
                        z: Math.floor(voxel.position.z)
                    });
                }
            }
        });

        // --- EXPORT TO VERCEL API ---
        document.getElementById('exportBtn').addEventListener('click', async () => {
            if (blockData.length === 0) return alert("Place some blocks first!");

            const payload = {
                size: [20, 20, 20], // The max boundary of our grid
                blocks: blockData.map(b => ({ x: b.x, y: b.y, z: b.z }))
            };

            const response = await fetch('/api/export', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) return alert("Failed to export!");

            // Download the binary file returned from Vercel
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "my_build.mcstructure";
            a.click();
            window.URL.revokeObjectURL(url);
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
